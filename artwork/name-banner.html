<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../public/shared/fonts/orbitron.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: #06060f;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Radial glow behind title, matching welcome screen */
      background: radial-gradient(ellipse at 50% 50%, rgba(0, 80, 200, 0.18) 0%, transparent 55%);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 96px;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #4444ff, #00c8ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(0, 200, 255, 0.4));
      text-align: center;
      line-height: 1.1;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="overlay">
    <h1>STACKER<br>PARTY</h1>
  </div>

  <script>
    // Minimal inline version of WelcomeBackground for static rendering
    const PIECE_COLORS = ['#000000','#EE4444','#00CED1','#FFD700','#7FFF00','#9B59F0','#FF1493','#FF8C00'];
    const SHAPES = {
      I: [[0,0],[0,1],[0,2],[0,3]],
      O: [[0,0],[0,1],[1,0],[1,1]],
      T: [[0,0],[0,1],[0,2],[1,1]],
      S: [[0,1],[0,2],[1,0],[1,1]],
      Z: [[0,0],[0,1],[1,1],[1,2]],
      J: [[0,0],[1,0],[1,1],[1,2]],
      L: [[0,2],[1,0],[1,1],[1,2]],
    };
    const KEYS = Object.keys(SHAPES);
    // Maps shape key to PIECE_COLORS index (matches PIECE_TYPE_TO_ID)
    const SHAPE_COLOR_INDEX = { I: 1, O: 4, T: 6, S: 5, Z: 7, J: 2, L: 3 };

    function rotate(blocks, times) {
      let b = blocks;
      for (let t = 0; t < times; t++) b = b.map(([r, c]) => [c, -r]);
      const minR = Math.min(...b.map(([r]) => r));
      const minC = Math.min(...b.map(([, c]) => c));
      return b.map(([r, c]) => [r - minR, c - minC]);
    }

    // Deterministic seeded random for reproducible banners
    let seed = 42;
    function rand() {
      seed = (seed * 16807 + 0) % 2147483647;
      return (seed - 1) / 2147483646;
    }

    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    const W = window.innerWidth;
    const H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Collision grid to prevent overlapping pieces
    const CELL = 8; // grid resolution in px
    const gridCols = Math.ceil(W / CELL);
    const gridRows = Math.ceil(H / CELL);
    const occupied = new Uint8Array(gridCols * gridRows);

    function markOccupied(px, py, blocks, blockSize, pad) {
      for (const [row, col] of blocks) {
        const x0 = Math.floor((px + col * blockSize - pad) / CELL);
        const y0 = Math.floor((py + row * blockSize - pad) / CELL);
        const x1 = Math.ceil((px + (col + 1) * blockSize + pad) / CELL);
        const y1 = Math.ceil((py + (row + 1) * blockSize + pad) / CELL);
        for (let gy = Math.max(0, y0); gy < Math.min(gridRows, y1); gy++) {
          for (let gx = Math.max(0, x0); gx < Math.min(gridCols, x1); gx++) {
            occupied[gy * gridCols + gx] = 1;
          }
        }
      }
    }

    function collides(px, py, blocks, blockSize, pad) {
      for (const [row, col] of blocks) {
        const x0 = Math.floor((px + col * blockSize - pad) / CELL);
        const y0 = Math.floor((py + row * blockSize - pad) / CELL);
        const x1 = Math.ceil((px + (col + 1) * blockSize + pad) / CELL);
        const y1 = Math.ceil((py + (row + 1) * blockSize + pad) / CELL);
        for (let gy = Math.max(0, y0); gy < Math.min(gridRows, y1); gy++) {
          for (let gx = Math.max(0, x0); gx < Math.min(gridCols, x1); gx++) {
            if (occupied[gy * gridCols + gx]) return true;
          }
        }
      }
      return false;
    }

    // Place pieces with collision avoidance
    const pieces = [];
    const PAD = 10; // minimum gap between pieces
    let attempts = 0;
    const MAX_ATTEMPTS = 2000;

    while (pieces.length < 28 && attempts < MAX_ATTEMPTS) {
      attempts++;
      const key = KEYS[Math.floor(rand() * KEYS.length)];
      const blocks = rotate(SHAPES[key], Math.floor(rand() * 4));
      const blockSize = 20 + rand() * 28;
      const colorIdx = SHAPE_COLOR_INDEX[key];

      const x = rand() * W;
      const y = rand() * H;
      // Match WelcomeBackground opacities; boost low-luminance colors
      const boost = key === 'J' ? 0.08 : (key === 'T' || key === 'L') ? 0.04 : 0;
      const opacity = 0.07 + rand() * 0.05 + boost;

      if (collides(x, y, blocks, blockSize, PAD)) continue;

      markOccupied(x, y, blocks, blockSize, PAD);
      pieces.push({
        blocks, blockSize, opacity,
        color: PIECE_COLORS[colorIdx],
        x, y,
      });
    }

    // Color manipulation helpers (match CanvasUtils.js)
    function lightenColor(hex, percent) {
      const rgb = hexToRgb(hex);
      if (!rgb) return hex;
      const f = 1 + percent / 100;
      return `rgb(${Math.min(255, Math.round(rgb.r * f))}, ${Math.min(255, Math.round(rgb.g * f))}, ${Math.min(255, Math.round(rgb.b * f))})`;
    }
    function darkenColor(hex, percent) {
      const rgb = hexToRgb(hex);
      if (!rgb) return hex;
      const f = 1 - percent / 100;
      return `rgb(${Math.round(rgb.r * f)}, ${Math.round(rgb.g * f)}, ${Math.round(rgb.b * f)})`;
    }
    function hexToRgb(hex) {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return m ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : null;
    }

    // Draw all pieces — match NORMAL stamp style from CanvasUtils.js
    for (const p of pieces) {
      ctx.globalAlpha = p.opacity;
      const size = p.blockSize;
      const inset = size * 0.03;
      const s = size - inset * 2;
      const cr = size * 0.12;
      for (const [row, col] of p.blocks) {
        const bx = p.x + col * size;
        const by = p.y + row * size;
        // Gradient fill (lighten top, darken bottom)
        const grad = ctx.createLinearGradient(bx, by, bx, by + size);
        grad.addColorStop(0, lightenColor(p.color, 15));
        grad.addColorStop(1, darkenColor(p.color, 10));
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.roundRect(bx + inset, by + inset, s, s, cr);
        ctx.fill();
        // Top highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
        ctx.fillRect(bx + inset + cr, by + inset, s - cr * 2, size * 0.08);
        // Left highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
        ctx.fillRect(bx + inset, by + inset + cr, size * 0.07, s - cr * 2);
        // Bottom shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        ctx.fillRect(bx + inset + cr, by + size - inset - size * 0.08, s - cr * 2, size * 0.08);
        // Inner shine
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        const sh = size * 0.25;
        ctx.fillRect(bx + size * 0.25, by + size * 0.2, sh, sh * 0.5);
      }
      ctx.globalAlpha = 1;
    }
  </script>
</body>
</html>
