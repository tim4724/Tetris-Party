<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Production theme tokens: --bg-primary, --bg-primary-rgb. Kept in sync
       with the live UI so banners never drift from the app background. -->
  <link rel="stylesheet" href="../public/shared/theme.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: var(--bg-primary);
    }

    .banner {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .display-img {
      position: absolute;
      top: var(--display-top, 0px);
      left: 0;
      width: 100%;
    }

    .overlay-gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top,
          rgba(var(--bg-primary-rgb), 0.85) 0%,
          rgba(var(--bg-primary-rgb), 0.15) 35%,
          transparent 55%);
      pointer-events: none;
    }

    .phone {
      position: absolute;
      bottom: var(--phone-bottom, -18px);
      left: var(--phone-left);
      width: 120px;
      height: var(--phone-height, 195px);
      border-radius: 18px;
      background: #1a1420;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 3px;
      z-index: 10;
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 8px;
      border-radius: 5px;
      background: #000;
      z-index: 2;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 15px;
      overflow: hidden;
      /* Matches #game-top-bar background in controller.css so the 14px
         status-bar gap flows into the controller screenshot below without
         a visible seam. */
      background: var(--bg-board);
      padding-top: 14px;
    }

    .controller-img {
      width: 100%;
      height: 100%;
      /* Controller capture viewport (generate.js) is tuned to match this
         phone-screen aspect, so `cover` + `top` fills the frame exactly
         — no side-bars, no bottom clipping. */
      object-fit: cover;
      object-position: top;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img class="display-img" id="display-hex-img" alt="">
    <div class="overlay-gradient"></div>

    <!-- Phone-left values align each phone near the bottom-right of its
         board. 3 boards at frame width split the display into thirds
         (slot centers at 16.7%, 50%, 83.3%); phones sit ~4% right of
         each, mirroring the offset used in the 4-player layout. -->
    <div class="phone" id="phone-0" style="--phone-left: 21%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-0" alt=""></div>
    </div>
    <div class="phone" id="phone-1" style="--phone-left: 54%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-1" alt=""></div>
    </div>
    <div class="phone" id="phone-2" style="--phone-left: 87%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-2" alt=""></div>
    </div>
  </div>
</body>
</html>
