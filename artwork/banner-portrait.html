<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../public/shared/theme.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: var(--bg-primary);
    }

    .banner {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Display sits at the top filling the full width; aspect preserved.
       Negative top pulls the image up so the boards anchor near the top
       edge instead of leaving a header strip of empty space. */
    .display-img {
      position: absolute;
      top: var(--display-top, -6%);
      left: 0;
      width: 100%;
      height: auto;
    }

    /* Bottom fade so phones read cleanly over the dark lower half. */
    .overlay-gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top,
          rgba(var(--bg-primary-rgb), 0.7) 0%,
          rgba(var(--bg-primary-rgb), 0.12) 25%,
          transparent 45%);
      pointer-events: none;
    }

    /* Two phones, stacked diagonally in the bottom-right, cropped at the
       bottom edge (negative `bottom`) like landscape banners. */
    /* Each phone sits at the bottom-right corner of its player's board
       — same offset the landscape gameplay banners use (phone shifted
       ~8% right of the board's center). Cropped at the bottom edge. */
    /* Each phone sits fully inside the frame at the bottom-right of its
       player's board. The end-screen CSS caps the image's rendered height
       (object-fit: cover) — phones stay fully visible via object-position. */
    .phone {
      position: absolute;
      bottom: 4%;
      width: 24%;
      aspect-ratio: 300 / 650;
      border-radius: 20px;
      background: #1a1420;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 14px 44px rgba(0, 0, 0, 0.72),
        0 0 24px color-mix(in srgb, var(--color) 14%, transparent);
      padding: 3px;
      z-index: 10;
    }

    .phone#phone-0 { left: 21%; }
    .phone#phone-1 { left: 71%; }

    .phone::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 8px;
      border-radius: 5px;
      background: #000;
      z-index: 2;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 17px;
      overflow: hidden;
      background: var(--bg-board);
      padding-top: 14px;
    }

    .controller-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img class="display-img" id="display-hex-img" alt="">
    <div class="overlay-gradient"></div>

    <div class="phone" id="phone-0">
      <div class="phone-screen"><img class="controller-img" id="ctrl-0" alt=""></div>
    </div>
    <div class="phone" id="phone-1">
      <div class="phone-screen"><img class="controller-img" id="ctrl-1" alt=""></div>
    </div>
  </div>
</body>
</html>
