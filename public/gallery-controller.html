<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Controller Gallery — HexStacker Party</title>
<link rel="stylesheet" href="/shared/theme.css">
<link rel="stylesheet" href="/gallery.css">
</head>
<body>
<header>
  <h1>HEX STACKER · CONTROLLER</h1>

  <div class="group">
    <span class="group-label">Device</span>
    <select id="controller-device">
      <option value="iphone15pm">iPhone 15 Pro Max · 430×932</option>
      <option value="iphone14" selected>iPhone 14 · 390×844</option>
      <option value="iphonese">iPhone SE · 375×667</option>
      <option value="pixel8">Pixel 8 · 412×915</option>
      <option value="galaxys23">Galaxy S23 · 360×780</option>
      <option value="zfoldcover">Z Fold cover · 280×653</option>
    </select>
  </div>

  <div class="group">
    <span class="group-label">Orient</span>
    <select id="controller-orientation">
      <option value="portrait" selected>Portrait</option>
      <option value="landscape">Landscape</option>
    </select>
  </div>

  <div class="group">
    <label class="group-label" for="controller-chrome" style="cursor:pointer;">
      <input type="checkbox" id="controller-chrome">
      Browser chrome
    </label>
  </div>

  <div class="group">
    <span class="group-label">Players</span>
    <input type="number" id="player-count" min="1" max="8" value="8">
  </div>

  <div class="group">
    <span class="group-label">Language</span>
    <select id="language">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
      <option value="pt">Português</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="tr">Türkçe</option>
      <option value="ru">Русский</option>
      <option value="zh">中文</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>
  </div>

  <div class="group">
    <span class="group-label">Cards/row</span>
    <select id="cards-per-row">
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5">5</option>
      <option value="6">6</option>
      <option value="7">7</option>
      <option value="8" selected>8</option>
    </select>
  </div>

  <div class="group">
    <button class="ctrl" id="reload-all">↻ Reload all</button>
  </div>

  <nav>
    <a href="/gallery.html">Display</a>
    <a href="/gallery-controller.html" class="active">Controller</a>
  </nav>
</header>

<section class="rail">
  <div id="controller-rows"></div>
</section>

<script src="/gallery-common.js"></script>
<script src="/gallery-controller.js"></script>
</body>
</html>
