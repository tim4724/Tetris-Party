<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="theme-color" content="#1E1A2B">
  <title>HexStacker Party Controller</title>
  <meta name="description" content="Multiplayer hex stacker — phones become controllers, a shared screen shows the action.">
  <meta property="og:title" content="HexStacker Party">
  <meta property="og:description" content="Multiplayer hex stacker — phones become controllers, a shared screen shows the action.">
  <meta property="og:image" content="https://hexstacker.com/artwork/social-preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="HexStacker Party">
  <meta name="twitter:description" content="Multiplayer hex stacker — phones become controllers, a shared screen shows the action.">
  <meta name="twitter:image" content="https://hexstacker.com/artwork/social-preview.png">
  <link rel="stylesheet" href="/shared/fonts/orbitron.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="stylesheet" href="/shared/theme.css">
  <link rel="stylesheet" href="/shared/results.css">
  <link rel="stylesheet" href="/controller/controller.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div id="ac-status-overlay">Loading...</div>

  <!-- Name input screen -->
  <div id="name-screen" class="screen controller-shell hidden">
    <div class="controller-shell__frame controller-shell__frame--name">
      <div class="controller-shell__brand">
        <h1 class="controller-shell__title gradient-title">HEX STACKER<span class="gradient-title__sub">party</span></h1>
      </div>
      <div class="controller-shell__body">
        <div id="name-form">
          <input id="name-input" type="text" maxlength="16" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" placeholder="Enter name..." data-i18n-placeholder="enter_name">
        </div>
      </div>
      <div class="controller-shell__actions controller-shell__actions--name">
        <div class="controller-shell__copy">
          <p id="name-status-text"></p>
          <p id="name-status-detail"></p>
        </div>
        <button id="name-join-btn" class="btn btn-primary" data-i18n="join">JOIN</button>
      </div>
      <div class="legal-links">
        <a href="/privacy" data-i18n="privacy">Privacy</a>
        <span aria-hidden="true">&middot;</span>
        <a href="/imprint" data-i18n="imprint">Imprint</a>
      </div>
    </div>
  </div>

  <!-- Lobby screen -->
  <div id="lobby-screen" class="screen controller-shell hidden">
    <div id="lobby-top-bar">
      <button id="lobby-back-btn" class="icon-btn" data-i18n-aria-label="back" aria-label="Back"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4L6 10L14 16"/></svg></button>
      <button id="lobby-settings-btn" class="icon-btn" data-i18n-aria-label="settings_title" aria-label="Settings"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
    </div>
    <div class="controller-shell__frame controller-shell__frame--lobby">
      <div class="controller-shell__brand">
        <h1 id="lobby-title" class="controller-shell__title gradient-title">HEX STACKER<span class="gradient-title__sub">party</span></h1>
      </div>
      <div class="controller-shell__body">
        <div id="player-identity">
          <div id="player-identity-card" class="player-card">
            <span id="player-identity-name"></span>
            <div id="level-selector">
              <span class="level-heading" data-i18n="level_heading">Level</span>
              <button id="level-minus-btn" class="level-btn" data-i18n-aria-label="level_minus" aria-label="Decrease level"><svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"><line x1="2" y1="7" x2="12" y2="7"/></svg></button>
              <span id="level-display">1</span>
              <button id="level-plus-btn" class="level-btn" data-i18n-aria-label="level_plus" aria-label="Increase level"><svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"><line x1="2" y1="7" x2="12" y2="7"/><line x1="7" y1="2" x2="7" y2="12"/></svg></button>
            </div>
          </div>
        </div>

        <div class="controller-shell__copy">
          <p id="status-text"></p>
          <p id="status-detail"></p>
        </div>
      </div>
      <div class="controller-shell__actions controller-shell__actions--lobby">
        <p id="waiting-action-text" class="status-banner hidden"></p>
        <button id="start-btn" class="btn btn-primary hidden" disabled data-i18n="start">START</button>
      </div>
      <p id="lobby-join-url" class="join-url-hint"></p>
    </div>
  </div>

  <!-- Game screen with touch area -->
  <div id="game-screen" class="screen hidden">
    <div id="game-top-bar">
      <span id="player-name" class="game-name-label"></span>
      <button id="settings-btn" class="icon-btn" data-i18n-aria-label="settings_title" aria-label="Settings"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      <button id="pause-btn" class="icon-btn hidden" data-i18n-aria-label="pause" aria-label="Pause"><span class="pause-icon"></span></button>
    </div>
    <div id="pause-overlay" class="game-overlay hidden">
      <h1 data-i18n="paused">PAUSED</h1>
      <div id="pause-buttons">
        <button id="pause-continue-btn" class="btn btn-primary" data-i18n="continue_btn">Continue</button>
        <button id="pause-newgame-btn" class="btn btn-secondary" data-i18n="new_game">New Game</button>
      </div>
      <p id="pause-status" class="game-overlay__status"></p>
    </div>
    <div id="reconnect-overlay" class="game-overlay hidden">
      <h1 id="reconnect-heading" data-i18n="reconnecting">RECONNECTING</h1>
      <p id="reconnect-status" class="game-overlay__status"></p>
      <button id="reconnect-rejoin-btn" class="btn btn-primary hidden" data-i18n="rejoin">REJOIN</button>
    </div>
    <div id="gesture-hints" aria-hidden="true">
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="36" height="18" viewBox="0 0 36 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 3L3 9L9 15" opacity="0.5"/><path d="M27 3L33 9L27 15" opacity="0.5"/><circle cx="18" cy="9" r="4" fill="currentColor" stroke="none" opacity="0.8"/><line x1="7" y1="9" x2="29" y2="9" opacity="0.2"/></svg></div><div class="hint-bar-item__verb" data-i18n="swipe">Swipe</div><div class="hint-bar-item__result" data-i18n="gesture_move">move</div></div>
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="14" r="3" fill="currentColor" stroke="none" opacity="0.8"/><circle cx="14" cy="14" r="8" opacity="0.25"/><circle cx="14" cy="14" r="13" opacity="0.1"/></svg></div><div class="hint-bar-item__verb" data-i18n="tap">Tap</div><div class="hint-bar-item__result" data-i18n="gesture_rotate">rotate</div></div>
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="22" height="28" viewBox="0 0 22 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="6" r="4" fill="currentColor" stroke="none" opacity="0.8"/><line x1="11" y1="10" x2="11" y2="23" opacity="0.3"/><path d="M7 19L11 24L15 19" opacity="0.5"/></svg></div><div class="hint-bar-item__verb" data-i18n="flick">Flick</div><div class="hint-bar-item__result" data-i18n="gesture_drop">drop</div></div>
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="22" height="28" viewBox="0 0 22 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="22" r="4" fill="currentColor" stroke="none" opacity="0.8"/><line x1="11" y1="18" x2="11" y2="5" opacity="0.3"/><path d="M7 9L11 4L15 9" opacity="0.5"/></svg></div><div class="hint-bar-item__verb" data-i18n="flick">Flick</div><div class="hint-bar-item__result" data-i18n="gesture_hold">hold</div></div>
    </div>
    <div id="touch-area">
      <div id="touch-pad">
        <div id="pad-label" aria-hidden="true" data-i18n="touchpad">Touchpad</div>
        <div id="feedback-layer"></div>
      </div>
    </div>
    <div id="game-bottom-bar">
      <span id="ping-display" class="ping-display">-- ms</span>
    </div>
  </div>

  <!-- Settings overlay — lives outside all screens so it can be opened
       from lobby or game without the ancestor screen hiding it. -->
  <div id="settings-overlay" class="game-overlay hidden">
    <div class="settings-panel">
      <h1 data-i18n="settings_title">SETTINGS</h1>
      <!-- Left-column cluster. In portrait it's display:contents (invisible),
           so the three rows flow as direct children of the panel's flex
           column. In landscape it becomes a flex column stacking music /
           touch / haptics tightly — keeps the sensitivity block (right col)
           from stretching the rows apart via rowspan. -->
      <div class="settings-body-left">
        <div class="settings-row settings-row--switch" id="row-mute-display" hidden>
          <span id="label-game-music" class="settings-row__label" data-i18n="settings_game_music">Game Music</span>
          <button class="settings-switch" id="toggle-mute-display" role="switch" aria-checked="true" aria-labelledby="label-game-music"><span class="settings-switch__thumb"></span></button>
        </div>
        <div class="settings-row settings-row--switch">
          <span id="label-touch-sounds" class="settings-row__label" data-i18n="settings_touch_sounds">Touch Sounds</span>
          <button class="settings-switch" id="toggle-mute-controller" role="switch" aria-checked="true" aria-labelledby="label-touch-sounds"><span class="settings-switch__thumb"></span></button>
        </div>
        <div class="settings-row" id="row-haptics">
          <span id="label-haptics" class="settings-row__label" data-i18n="settings_haptics">Haptics</span>
          <div class="settings-segmented" role="radiogroup" aria-labelledby="label-haptics">
            <button class="settings-segmented__btn" data-haptic="off" role="radio" aria-checked="false" data-i18n="settings_haptic_off">Off</button>
            <button class="settings-segmented__btn" data-haptic="light" role="radio" aria-checked="false" data-i18n="settings_haptic_light">Light</button>
            <button class="settings-segmented__btn" data-haptic="medium" role="radio" aria-checked="true" data-i18n="settings_haptic_medium">Med</button>
            <button class="settings-segmented__btn" data-haptic="strong" role="radio" aria-checked="false" data-i18n="settings_haptic_strong">Strong</button>
          </div>
          <p class="settings-row__hint" data-i18n="settings_haptics_hint">Vibration may not work on all devices</p>
        </div>
      </div>
      <div class="settings-row" id="row-sensitivity">
        <span class="settings-row__label">
          <span id="sensitivity-label-text" data-i18n="settings_sensitivity">Sensitivity</span>
          <span class="settings-row__value" id="sensitivity-value">1.00</span>
        </span>
        <input type="range" id="sensitivity-slider" min="0.55" max="1.75" step="0.05" value="1" aria-labelledby="sensitivity-label-text">
        <canvas id="sensitivity-preview" class="settings-preview" width="280" height="120" aria-hidden="true"></canvas>
      </div>
      <button id="settings-close" class="btn btn-primary" data-i18n="settings_done">DONE</button>
      <footer class="settings-about">
        <span class="settings-about__brand">HexStacker</span> <span id="settings-version"></span>
      </footer>
    </div>
  </div>

  <!-- Game over screen -->
  <div id="gameover-screen" class="screen controller-shell hidden">
    <div class="controller-shell__frame controller-shell__frame--results">
      <div class="controller-shell__brand">
        <h1 class="controller-shell__title gradient-title">HEX STACKER<span class="gradient-title__sub">party</span></h1>
      </div>
      <div class="controller-shell__body controller-shell__body--results">
        <div id="results-list"></div>
      </div>
      <div id="gameover-actions" class="controller-shell__actions">
        <p id="gameover-status" class="status-banner"></p>
        <div id="gameover-buttons" class="hidden">
          <button id="play-again-btn" class="btn btn-primary" data-i18n="play_again">Play Again</button>
          <button id="new-game-btn" class="btn btn-secondary" data-i18n="new_game">New Game</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/engine/constants.js"></script>
  <script src="/engine/Piece.js"></script>
  <script src="/shared/PartyConnection.js"></script>
  <script src="/shared/AirConsoleAdapter.js"></script>
  <script src="/shared/protocol.js"></script>
  <script src="/shared/i18n.js"></script>
  <script src="/shared/i18n-fallback.js"></script>
  <script src="/shared/theme.js"></script>
  <script src="/shared/WelcomeBackground.js"></script>
  <script src="/shared/share-helper.js"></script>
  <script src="/controller/TouchInput.js"></script>
  <script src="/controller/Audio.js"></script>
  <script src="/controller/Settings.js"></script>
  <script src="/controller/ControllerState.js"></script>
  <script src="/controller/ControllerConnection.js"></script>
  <script src="/controller/ControllerGame.js"></script>
  <script src="/controller/controller.js"></script>
  <script src="/controller/ControllerTestHarness.js"></script>
</body>
</html>
