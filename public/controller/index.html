<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Stacker Party Controller</title>
  <meta name="description" content="Multiplayer stacker — play on your TV, control with your phone.">
  <meta property="og:title" content="Stacker Party">
  <meta property="og:description" content="Multiplayer stacker — play on your TV, control with your phone.">
  <meta property="og:image" content="https://couch-games.com/social-preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Stacker Party">
  <meta name="twitter:description" content="Multiplayer stacker — play on your TV, control with your phone.">
  <meta name="twitter:image" content="https://couch-games.com/social-preview.png">
  <link rel="stylesheet" href="/shared/fonts/orbitron.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/shared/theme.css">
  <link rel="stylesheet" href="/shared/results.css">
  <link rel="stylesheet" href="/controller/controller.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <!-- Name input screen -->
  <div id="name-screen" class="screen controller-shell hidden">
    <div class="controller-shell__frame controller-shell__frame--name">
      <div class="controller-shell__brand">
        <h1 class="controller-shell__title gradient-title">STACKER PARTY</h1>
      </div>
      <div class="controller-shell__body">
        <div id="name-form">
          <input id="name-input" type="text" maxlength="16" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" placeholder="Enter name...">
        </div>
        <div id="room-gone-message" class="controller-shell__copy hidden">
          <p id="room-gone-heading"></p>
          <p id="room-gone-detail"></p>
        </div>
      </div>
      <div class="controller-shell__actions controller-shell__actions--name">
        <div class="controller-shell__copy">
          <p id="name-status-text"></p>
          <p id="name-status-detail"></p>
        </div>
        <button id="name-join-btn" class="btn btn-primary">JOIN</button>
      </div>
      <a class="privacy-link" href="/privacy">Privacy</a>
    </div>
  </div>

  <!-- Lobby screen -->
  <div id="lobby-screen" class="screen controller-shell hidden">
    <div id="lobby-top-bar">
      <button id="lobby-back-btn" class="icon-btn" aria-label="Back"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4L6 10L14 16"/></svg></button>
    </div>
    <div class="controller-shell__frame controller-shell__frame--lobby">
      <div class="controller-shell__brand">
        <h1 id="lobby-title" class="controller-shell__title gradient-title">STACKER PARTY</h1>
      </div>
      <div class="controller-shell__body">
        <div id="mode-selector">
          <button class="mode-option selected" data-mode="classic">
            <svg class="mode-icon" viewBox="0 0 11 11" fill="currentColor"><rect x="0" y="0" width="5" height="5" rx="0.7"/><rect x="0" y="6" width="5" height="5" rx="0.7"/><rect x="6" y="6" width="5" height="5" rx="0.7"/><rect x="6" y="0" width="5" height="5" rx="0.7"/></svg>
            SQUARE
          </button>
          <button class="mode-option" data-mode="hex">
            <svg class="mode-icon mode-icon--hex" viewBox="0 0 10.5 13" fill="currentColor"><path d="M5.5,2.6 L4.25,4.8 L1.75,4.8 L0.5,2.6 L1.75,0.4 L4.25,0.4Z"/><path d="M10,5.2 L8.75,7.4 L6.25,7.4 L5,5.2 L6.25,3 L8.75,3Z"/><path d="M5.5,7.8 L4.25,10 L1.75,10 L0.5,7.8 L1.75,5.6 L4.25,5.6Z"/><path d="M10,10.4 L8.75,12.6 L6.25,12.6 L5,10.4 L6.25,8.2 L8.75,8.2Z"/></svg>
            HEX
            <span class="badge-new">NEW</span>
          </button>
        </div>
        <div id="player-identity">
          <div id="player-identity-card" class="player-card">
            <span id="player-identity-name"></span>
            <div id="level-selector">
              <span class="level-heading">Level</span>
              <button id="level-minus-btn" class="level-btn" aria-label="Decrease level"><svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"><line x1="2" y1="7" x2="12" y2="7"/></svg></button>
              <span id="level-display">1</span>
              <button id="level-plus-btn" class="level-btn" aria-label="Increase level"><svg width="18" height="18" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square"><line x1="2" y1="7" x2="12" y2="7"/><line x1="7" y1="2" x2="7" y2="12"/></svg></button>
            </div>
          </div>
        </div>

        <div class="controller-shell__copy">
          <p id="status-text"></p>
          <p id="status-detail"></p>
        </div>
      </div>
      <div class="controller-shell__actions controller-shell__actions--lobby">
        <p id="waiting-action-text" class="status-banner hidden"></p>
        <button id="start-btn" class="btn btn-primary hidden" disabled>START</button>
      </div>
      <p id="lobby-join-url" class="join-url-hint"></p>
    </div>
  </div>

  <!-- Game screen with touch area -->
  <div id="game-screen" class="screen hidden">
    <div id="game-top-bar">
      <span id="player-name" class="game-name-label">Player</span>
      <button id="mute-btn" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
      <button id="pause-btn" class="icon-btn hidden"><span class="pause-icon"></span></button>
    </div>
    <div id="pause-overlay" class="game-overlay hidden">
      <h1>PAUSED</h1>
      <div id="pause-buttons">
        <button id="pause-continue-btn" class="btn btn-primary">CONTINUE</button>
        <button id="pause-newgame-btn" class="btn btn-secondary">NEW GAME</button>
      </div>
      <p id="pause-status" class="game-overlay__status"></p>
    </div>
    <div id="reconnect-overlay" class="game-overlay hidden">
      <h1 id="reconnect-heading">RECONNECTING</h1>
      <p id="reconnect-status" class="game-overlay__status"></p>
      <button id="reconnect-rejoin-btn" class="btn btn-primary hidden">REJOIN</button>
    </div>
    <div id="gesture-hints" aria-hidden="true">
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="36" height="18" viewBox="0 0 36 18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 3L3 9L9 15" opacity="0.5"/><path d="M27 3L33 9L27 15" opacity="0.5"/><circle cx="18" cy="9" r="4" fill="currentColor" stroke="none" opacity="0.8"/><line x1="7" y1="9" x2="29" y2="9" opacity="0.2"/></svg></div><div class="hint-bar-item__verb">Swipe</div><div class="hint-bar-item__result">move</div></div>
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="14" r="3" fill="currentColor" stroke="none" opacity="0.8"/><circle cx="14" cy="14" r="8" opacity="0.25"/><circle cx="14" cy="14" r="13" opacity="0.1"/></svg></div><div class="hint-bar-item__verb">Tap</div><div class="hint-bar-item__result">rotate</div></div>
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="22" height="28" viewBox="0 0 22 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="6" r="4" fill="currentColor" stroke="none" opacity="0.8"/><line x1="11" y1="10" x2="11" y2="23" opacity="0.3"/><path d="M7 19L11 24L15 19" opacity="0.5"/></svg></div><div class="hint-bar-item__verb">Flick</div><div class="hint-bar-item__result">drop</div></div>
      <div class="hint-bar-item"><div class="hint-bar-item__icon"><svg width="22" height="28" viewBox="0 0 22 28" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="22" r="4" fill="currentColor" stroke="none" opacity="0.8"/><line x1="11" y1="18" x2="11" y2="5" opacity="0.3"/><path d="M7 9L11 4L15 9" opacity="0.5"/></svg></div><div class="hint-bar-item__verb">Flick</div><div class="hint-bar-item__result">hold</div></div>
    </div>
    <div id="touch-area">
      <div id="touch-pad">
        <div id="pad-label" aria-hidden="true">Touchpad</div>
        <div id="feedback-layer"></div>
      </div>
    </div>
    <div id="game-bottom-bar">
      <span id="ping-display" class="ping-display">-- ms</span>
    </div>
  </div>

  <!-- Game over screen -->
  <div id="gameover-screen" class="screen controller-shell hidden">
    <div class="controller-shell__frame controller-shell__frame--results">
      <div class="controller-shell__brand">
        <h1 class="controller-shell__title gradient-title">STACKER PARTY</h1>
      </div>
      <div class="controller-shell__body controller-shell__body--results">
        <div id="results-list"></div>
      </div>
      <div id="gameover-actions" class="controller-shell__actions">
        <p id="gameover-status" class="status-banner"></p>
        <div id="gameover-buttons" class="hidden">
          <button id="play-again-btn" class="btn btn-primary">PLAY AGAIN</button>
          <button id="new-game-btn" class="btn btn-secondary">NEW GAME</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/engine/constants.js"></script>
  <script src="/engine/Piece.js"></script>
  <script src="/engine/HexConstants.js"></script>
  <script src="/engine/HexPiece.js"></script>
  <script src="/shared/PartyConnection.js"></script>
  <script src="/shared/protocol.js"></script>
  <script src="/shared/theme.js"></script>
  <script src="/shared/WelcomeBackground.js"></script>
  <script src="/controller/TouchInput.js"></script>
  <script src="/controller/Audio.js"></script>
  <script src="/controller/ControllerState.js"></script>
  <script src="/controller/ControllerConnection.js"></script>
  <script src="/controller/ControllerGame.js"></script>
  <script src="/controller/controller.js"></script>
</body>
</html>
