<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tetris Party Controller</title>
  <meta name="description" content="Multiplayer Tetris — play on your TV, control with your phone.">
  <meta property="og:title" content="Tetris Party">
  <meta property="og:description" content="Multiplayer Tetris — play on your TV, control with your phone.">
  <meta property="og:image" content="https://tetris.party/social-preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tetris Party">
  <meta name="twitter:description" content="Multiplayer Tetris — play on your TV, control with your phone.">
  <meta name="twitter:image" content="https://tetris.party/social-preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <link rel="stylesheet" href="/shared/theme.css">
  <link rel="stylesheet" href="/shared/results.css">
  <link rel="stylesheet" href="/controller/controller.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <!-- Name input screen -->
  <div id="name-screen" class="screen controller-shell hidden">
    <div class="controller-shell__frame controller-shell__frame--name">
      <div class="controller-shell__brand">
        <h1 class="controller-shell__title gradient-title">TETRIS PARTY</h1>
      </div>
      <div class="controller-shell__body">
        <div id="name-form">
          <input id="name-input" type="text" maxlength="16" autocomplete="off" autocorrect="off" autocapitalize="words" spellcheck="false" placeholder="Enter name...">
        </div>
        <div id="room-gone-message" class="controller-shell__copy hidden">
          <p id="room-gone-heading"></p>
          <p id="room-gone-detail"></p>
        </div>
      </div>
      <div class="controller-shell__actions controller-shell__actions--name">
        <div class="controller-shell__copy">
          <p id="name-status-text"></p>
          <p id="name-status-detail"></p>
        </div>
        <button id="name-join-btn" class="btn btn-primary">JOIN</button>
      </div>
      <p id="name-join-url" class="join-url-hint"></p>
    </div>
  </div>

  <!-- Lobby screen -->
  <div id="lobby-screen" class="screen controller-shell hidden">
    <div id="lobby-top-bar">
      <button id="lobby-back-btn" class="icon-btn" aria-label="Back"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4L6 10L14 16"/></svg></button>
    </div>
    <div class="controller-shell__frame controller-shell__frame--lobby">
      <div class="controller-shell__brand">
        <h1 id="lobby-title" class="controller-shell__title gradient-title">TETRIS PARTY</h1>
      </div>
      <div class="controller-shell__body">
        <div id="player-identity">
          <div id="player-identity-card" class="player-card">
            <span id="player-identity-name"></span>
          </div>
        </div>
        <div class="controller-shell__copy">
          <p id="status-text"></p>
          <p id="status-detail"></p>
        </div>
      </div>
      <div class="controller-shell__actions controller-shell__actions--lobby">
        <p id="waiting-action-text" class="status-banner hidden"></p>
        <button id="start-btn" class="btn btn-primary hidden" disabled>START</button>
      </div>
      <p id="lobby-join-url" class="join-url-hint"></p>
    </div>
  </div>

  <!-- Game screen with touch area -->
  <div id="game-screen" class="screen hidden">
    <div id="game-top-bar">
      <div id="game-name-card" class="player-card"><span id="player-name">Player</span></div>
      <button id="mute-btn" class="icon-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
      <button id="pause-btn" class="icon-btn hidden"><span class="pause-icon"></span></button>
    </div>
    <div id="pause-overlay" class="game-overlay hidden">
      <h1>PAUSED</h1>
      <div id="pause-buttons">
        <button id="pause-continue-btn" class="btn btn-primary">CONTINUE</button>
        <button id="pause-newgame-btn" class="btn btn-secondary">NEW GAME</button>
      </div>
      <p id="pause-status" class="game-overlay__status"></p>
    </div>
    <div id="reconnect-overlay" class="game-overlay hidden">
      <h1 id="reconnect-heading">RECONNECTING</h1>
      <p id="reconnect-status" class="game-overlay__status"></p>
      <button id="reconnect-rejoin-btn" class="btn btn-primary hidden">REJOIN</button>
    </div>
    <div id="gesture-hints" aria-hidden="true">
      <div class="gesture-hint-primary"><svg class="hint-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4L7 10L13 16"/></svg> Drag to move <svg class="hint-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4L13 10L7 16"/></svg></div>
      <div class="gesture-hint-row"><svg class="hint-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/><path d="M21 3v6h-6"/></svg> Tap to rotate</div>
      <div class="gesture-hint-row">Flick <svg class="hint-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3L10 9L16 3"/><path d="M4 10L10 16L16 10"/></svg> drop · Flick <svg class="hint-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14L10 8L16 14"/><path d="M4 8L10 2L16 8"/></svg> hold</div>
    </div>
    <div id="touch-area">
      <div id="touch-pad">
        <div id="compass-hints" aria-hidden="true">
          <div class="compass-arrow compass-up">
            <svg width="32" height="32" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14L10 8L16 14"/><path d="M4 8L10 2L16 8"/></svg>
            <span>HOLD</span>
          </div>
          <div class="compass-arrow compass-down">
            <svg width="32" height="32" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 3L10 9L16 3"/><path d="M4 10L10 16L16 10"/></svg>
            <span>DROP</span>
          </div>
          <div class="compass-arrow compass-left">
            <svg width="28" height="28" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4L7 10L13 16"/></svg>
            <span>MOVE</span>
          </div>
          <div class="compass-arrow compass-right">
            <svg width="28" height="28" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4L13 10L7 16"/></svg>
            <span>MOVE</span>
          </div>
          <div class="compass-arrow compass-center">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.22-8.56"/><path d="M21 3v6h-6"/></svg>
            <span>TAP</span>
          </div>
        </div>
        <div id="feedback-layer"></div>
      </div>
    </div>
    <div id="game-bottom-bar">
      <span id="ping-display" class="ping-display">-- ms</span>
    </div>
  </div>

  <!-- Game over screen -->
  <div id="gameover-screen" class="screen controller-shell hidden">
    <div class="controller-shell__frame controller-shell__frame--results">
      <div class="controller-shell__brand">
        <h1 class="controller-shell__title gradient-title">TETRIS PARTY</h1>
      </div>
      <div class="controller-shell__body controller-shell__body--results">
        <div id="results-list"></div>
      </div>
      <div id="gameover-actions" class="controller-shell__actions">
        <p id="gameover-status" class="status-banner"></p>
        <div id="gameover-buttons" class="hidden">
          <button id="play-again-btn" class="btn btn-primary">PLAY AGAIN</button>
          <button id="new-game-btn" class="btn btn-secondary">NEW GAME</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/shared/PartyConnection.js"></script>
  <script src="/shared/protocol.js"></script>
  <script src="/shared/theme.js"></script>
  <script src="/shared/WelcomeBackground.js"></script>
  <script src="/controller/TouchInput.js"></script>
  <script src="/controller/Audio.js"></script>
  <script src="/controller/ControllerState.js"></script>
  <script src="/controller/ControllerConnection.js"></script>
  <script src="/controller/ControllerGame.js"></script>
  <script src="/controller/controller.js"></script>
</body>
</html>
