<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Display Gallery — HexStacker Party</title>
<link rel="stylesheet" href="/shared/theme.css">
<link rel="stylesheet" href="/gallery.css">
</head>
<body>
<header>
  <h1>HEX STACKER · DISPLAY</h1>

  <div class="group">
    <select id="display-ar">
      <option value="16x9" selected>AR 16:9</option>
      <option value="21x9">AR 21:9</option>
      <option value="4x3">AR 4:3</option>
      <option value="1x1">AR 1:1</option>
    </select>
  </div>

  <div class="group">
    <select id="player-count">
      <option value="1">1 Player</option>
      <option value="2">2 Players</option>
      <option value="3">3 Players</option>
      <option value="4" selected>4 Players</option>
      <option value="5">5 Players</option>
      <option value="6">6 Players</option>
      <option value="7">7 Players</option>
      <option value="8">8 Players</option>
    </select>
  </div>

  <div class="group">
    <select id="view-as-player">
      <option value="0" selected>View as P1</option>
      <option value="1">View as P2</option>
      <option value="2">View as P3</option>
      <option value="3">View as P4</option>
      <option value="4">View as P5</option>
      <option value="5">View as P6</option>
      <option value="6">View as P7</option>
      <option value="7">View as P8</option>
    </select>
  </div>

  <div class="group">
    <select id="language">
      <option value="en">English</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
      <option value="pt">Português</option>
      <option value="es">Español</option>
      <option value="it">Italiano</option>
      <option value="tr">Türkçe</option>
      <option value="ru">Русский</option>
      <option value="zh">中文</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>
  </div>

  <div class="group">
    <select id="cards-per-row">
      <option value="1">1 column</option>
      <option value="2">2 columns</option>
      <option value="3">3 columns</option>
      <option value="4" selected>4 columns</option>
      <option value="5">5 columns</option>
    </select>
  </div>

  <button class="ctrl options-toggle" id="options-toggle" aria-expanded="false" aria-label="Options">⚙</button>

  <nav>
    <a href="/gallery.html" class="active">Display</a>
    <a href="/gallery-controller.html">Phone</a>
  </nav>
</header>

<section class="rail">
  <div id="display-rows"></div>
</section>

<script src="/gallery-common.js"></script>
<script src="/gallery-display.js"></script>
</body>
</html>
