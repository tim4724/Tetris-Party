<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacker Party</title>
  <meta name="description" content="Multiplayer stacker — play on your TV, control with your phone.">
  <meta property="og:title" content="Stacker Party">
  <meta property="og:description" content="Multiplayer stacker — play on your TV, control with your phone.">
  <meta property="og:image" content="https://couch-games.com/social-preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Stacker Party">
  <meta name="twitter:description" content="Multiplayer stacker — play on your TV, control with your phone.">
  <meta name="twitter:image" content="https://couch-games.com/social-preview.png">
  <link rel="stylesheet" href="/shared/fonts/orbitron.css">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/shared/theme.css">
  <link rel="stylesheet" href="/shared/results.css">
  <link rel="stylesheet" href="/display/display.css">
</head>
<body>
  <!-- Shared falling piece background (visible on welcome + lobby) -->
  <canvas id="bg-canvas"></canvas>

  <!-- Mobile screen hint -->
  <div id="mobile-hint">
    <h1 class="gradient-title">STACKER PARTY</h1>
    <div id="mobile-hint-body">
      <p id="mobile-hint-heading">Open on a Larger Screen</p>
      <p id="mobile-hint-detail">This display is designed for TVs and computers. Use your phone as a controller instead.</p>
    </div>
    <button id="mobile-hint-btn" class="btn btn-secondary">CONTINUE ANYWAY</button>
  </div>

  <!-- Welcome screen: unlocks audio via user gesture -->
  <div id="welcome-screen" class="screen">
    <h1 class="gradient-title">STACKER PARTY</h1>
    <button id="new-game-btn" class="btn btn-primary">START NEW GAME</button>
    <div id="welcome-footer">
      <div class="footer-row">
        <a id="github-link" href="https://github.com/tim4724/Stacker-Party" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-dot">&middot;</span>
        <a href="/privacy">Privacy</a>
      </div>
      <div class="footer-row"><a href="https://opengameart.org/content/lunar-joyride-8-bit" target="_blank" rel="noopener">Music by FoxSynergy (CC BY 3.0)</a></div>
      <span id="version-label"></span>
    </div>
  </div>

  <!-- Lobby screen: QR code + player list + start button -->
  <div id="lobby-screen" class="screen hidden">
    <h1 class="gradient-title">STACKER PARTY</h1>
    <div id="qr-container">
      <canvas id="qr-code"></canvas>
      <p id="qr-label">Scan to join</p>
      <p id="join-url"></p>
    </div>
    <div id="mode-selector">
      <button class="mode-option selected" data-mode="classic">
        <svg class="mode-icon" viewBox="0 0 11 11" fill="currentColor"><rect x="0" y="0" width="5" height="5" rx="0.7"/><rect x="0" y="6" width="5" height="5" rx="0.7"/><rect x="6" y="6" width="5" height="5" rx="0.7"/><rect x="6" y="0" width="5" height="5" rx="0.7"/></svg>
        SQUARE
      </button>
      <button class="mode-option" data-mode="hex">
        <svg class="mode-icon mode-icon--hex" viewBox="0 0 10.5 13" fill="currentColor"><path d="M5.5,2.6 L4.25,4.8 L1.75,4.8 L0.5,2.6 L1.75,0.4 L4.25,0.4Z"/><path d="M10,5.2 L8.75,7.4 L6.25,7.4 L5,5.2 L6.25,3 L8.75,3Z"/><path d="M5.5,7.8 L4.25,10 L1.75,10 L0.5,7.8 L1.75,5.6 L4.25,5.6Z"/><path d="M10,10.4 L8.75,12.6 L6.25,12.6 L5,10.4 L6.25,8.2 L8.75,8.2Z"/></svg>
        HEX
        <span class="badge-new">NEW</span>
      </button>
    </div>
    <div id="player-list"></div>
    <button id="start-btn" class="btn btn-primary" disabled>Waiting for players...</button>
  </div>

  <div id="game-toolbar" class="hidden">
    <button id="mute-btn" class="icon-btn" title="Toggle mute"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path class="sound-waves" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
    <button id="fullscreen-btn" class="icon-btn" title="Toggle fullscreen"><svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M3 3h4V1H1v6h2V3zM11 1v2h4v4h2V1h-6zM15 15h-4v2h6v-6h-2v4zM3 11H1v6h6v-2H3v-4z"/></svg></button>
    <button id="pause-btn" class="icon-btn"><span class="pause-icon"></span></button>
  </div>

  <!-- Game screen: canvas boards -->
  <div id="game-screen" class="screen hidden">
    <canvas id="game-canvas"></canvas>
    <div id="countdown-overlay" class="hidden"></div>
  </div>

  <!-- Pause overlay -->
  <div id="pause-overlay" class="game-overlay hidden">
    <h1>PAUSED</h1>
    <div id="pause-buttons">
      <button id="pause-continue-btn" class="btn btn-primary">Continue</button>
      <button id="pause-newgame-btn" class="btn btn-secondary">New Game</button>
    </div>
  </div>

  <!-- Reconnect overlay -->
  <div id="reconnect-overlay" class="game-overlay hidden">
    <h1 id="reconnect-heading">RECONNECTING</h1>
    <p id="reconnect-status" class="game-overlay__status">Connection lost...</p>
    <button id="reconnect-btn" class="btn btn-primary hidden">RECONNECT</button>
  </div>

  <!-- Results overlay (shown on top of game screen) -->
  <div id="results-screen" class="screen hidden">
    <div id="results-list"></div>
    <div id="results-buttons">
      <button id="play-again-btn" class="btn btn-primary">Play Again</button>
      <button id="new-game-results-btn" class="btn btn-secondary">New Game</button>
    </div>
  </div>

  <script src="/engine/constants.js"></script>
  <script src="/engine/Piece.js"></script>
  <script src="/engine/Randomizer.js"></script>

  <script src="/engine/GarbageManager.js"></script>
  <script src="/engine/BaseBoard.js"></script>
  <script src="/engine/PlayerBoard.js"></script>
  <script src="/engine/HexConstants.js"></script>
  <script src="/engine/HexPiece.js"></script>
  <script src="/engine/HexPlayerBoard.js"></script>
  <script src="/engine/Game.js"></script>
  <script src="/shared/PartyConnection.js"></script>
  <script src="/shared/protocol.js"></script>
  <script src="/shared/CanvasUtils.js"></script>
  <script src="/shared/theme.js"></script>
  <script src="/shared/WelcomeBackground.js"></script>
  <script src="/display/BoardRenderer.js"></script>
  <script src="/display/UIRenderer.js"></script>
  <script src="/display/HexBoardRenderer.js"></script>
  <script src="/display/HexUIRenderer.js"></script>
  <script src="/display/Animations.js"></script>
  <script src="/display/Music.js"></script>
  <script src="/display/DisplayState.js"></script>
  <script src="/display/DisplayUI.js"></script>
  <script src="/display/DisplayConnection.js"></script>
  <script src="/display/DisplayAudio.js"></script>
  <script src="/display/DisplayGame.js"></script>
  <script src="/display/DisplayInput.js"></script>
  <script src="/display/DisplayRender.js"></script>
  <script src="/display/display.js"></script>
</body>
</html>
