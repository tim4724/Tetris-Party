<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imprint — Stacker Party</title>
  <link rel="icon" href="/favicon-classic.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/shared/fonts/orbitron.css">
  <link rel="stylesheet" href="/shared/theme.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-primary);
      color: var(--text-secondary);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(16px, 2vw, 18px);
      line-height: 1.8;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .imprint-shell {
      position: relative;
      width: 100%;
      max-width: 960px;
      padding: clamp(2rem, 6vh, 4rem) 1.5rem clamp(2rem, 4vh, 3rem);
      background:
        radial-gradient(ellipse at 50% 0%, var(--glow-blue) 0%, transparent 50%);
    }

    .back-link {
      position: absolute;
      top: clamp(1rem, 2.5vh, 1.5rem);
      left: clamp(1rem, 2.5vw, 1.5rem);
      font-size: 14px;
      color: var(--text-secondary);
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 4px;
      opacity: var(--opacity-label);
      transition: color var(--transition-fast), opacity var(--transition-fast);
    }

    .back-link:hover {
      color: var(--accent-cyan);
      opacity: 1;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      margin-bottom: clamp(1.5rem, 4vh, 2.5rem);
      animation: fadeDown 0.5s ease-out both;
    }

    dl {
      animation: fadeUp 0.5s 0.15s ease-out both;
    }

    dt {
      color: var(--text-primary);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 1.6rem;
    }

    dt:first-child {
      margin-top: 0;
    }

    dd {
      margin: 0.3rem 0 0 0;
    }

    a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: filter var(--transition-fast);
    }

    a:hover {
      color: var(--accent-cyan);
      filter: drop-shadow(0 0 6px rgba(var(--accent-cyan-rgb), 0.3));
    }

    ::selection {
      background: rgba(var(--accent-cyan-rgb), 0.2);
      color: var(--text-primary);
    }

    h1.gradient-title {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan), var(--accent-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .footer {
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
      font-size: 14px;
      opacity: var(--opacity-label);
      animation: fadeUp 0.5s 0.3s ease-out both;
    }
  </style>
</head>
<body>
  <main class="imprint-shell">
    <a href="/" class="back-link" data-i18n="back_to_game">← Back</a>
    <h1 class="gradient-title" data-i18n="imprint_title">IMPRINT</h1>
    <dl>
      <dt data-i18n="imprint_notice">Information pursuant to § 5 DDG</dt>
      <dd>Tim Vogel</dd>
      <dd>c/o Impressumservice Dein-Impressum</dd>
      <dd>Stettiner Straße 41</dd>
      <dd>35410 Hungen</dd>
      <dt data-i18n="privacy_contact">contact</dt>
      <dd><a href="mailto:info@couch-games.com">info@couch-games.com</a></dd>
    </dl>
    <p class="footer"><a href="/privacy" data-i18n="privacy">Privacy</a></p>
  </main>
  <script src="/shared/i18n.js"></script>
  <script src="/shared/i18n-fallback.js"></script>
</body>
</html>
