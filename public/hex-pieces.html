<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hex Piece Design</title>
<style>
  :root {
    --bg: #0a0a0a;
    --panel: #141414;
    --panel-2: #1c1c1c;
    --border: #2a2a2a;
    --text: #e6e6e6;
    --muted: #888;
    --accent: #6ac6ff;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 24px 80px;
    margin: 0;
    line-height: 1.5;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 28px;
  }
  h2 {
    margin: 48px 0 4px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    font-size: 20px;
  }
  .subtitle {
    color: var(--muted);
    margin: 0 0 24px;
    max-width: 760px;
  }
  .intro {
    color: var(--muted);
    max-width: 760px;
    margin: 0 0 20px;
  }
  .piece-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
    margin-top: 16px;
  }
  .piece {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .piece.problem {
    border-color: #703030;
    background: #1a0e0e;
  }
  .piece.new {
    border-color: #2e6b3a;
    background: #0e1a12;
  }
  .piece-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 4px;
  }
  .piece-name {
    font-size: 20px;
    font-weight: 700;
  }
  .piece-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-problem { background: #703030; color: #ffdcdc; }
  .badge-new { background: #2e6b3a; color: #d3ffdc; }
  .badge-rename { background: #3a4f70; color: #dfe8ff; }
  .piece-note {
    color: var(--muted);
    font-size: 13px;
    margin: 6px 0 12px;
  }
  .rotations {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
  }
  .rotation {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .rot-svg {
    background: #000;
    border: 1px solid #222;
    border-radius: 4px;
    display: block;
  }
  .rot-label {
    font-size: 10px;
    color: var(--muted);
  }
  .legend {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 13px;
  }
  .legend-swatch {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<h1>Hex Piece Design</h1>
<p class="subtitle">
Each piece is shown in all 6 axial rotations (60° increments).
Flat-top hexagons with odd-q offset — odd columns are rendered half a hex lower
than even columns, so a "horizontal row" in the clear pattern is actually a sawtooth.
</p>

<div id="app"></div>

<script>
// ===================== Piece definitions (axial) =====================
// Same coordinate system as server/HexPiece.js — copy of the current definitions.
const CURRENT_PIECES = {
  I: { cells: [[-1,0],[0,0],[1,0],[2,0]],   color: '#00d4d4' },
  J: { cells: [[-1,1],[0,0],[1,-1],[-1,0]], color: '#3366ff' },
  L: { cells: [[-1,0],[0,0],[1,0],[1,-1]],  color: '#ff9900' },
  O: { cells: [[-1,0],[0,0],[0,-1],[1,-1]], color: '#ffdd00' },
  S: { cells: [[-2,1],[-1,1],[0,0],[1,0]],  color: '#44dd44' },
  T: { cells: [[0,0],[1,0],[-1,1],[0,-1]],  color: '#cc44cc' },
  Z: { cells: [[-1,1],[0,0],[1,0],[2,-1]],  color: '#ee4444' },
};

// Proposed new pieces — 4-chain with a single 60° bend.
// Default orientation chosen so the piece visually reads as a true L / J
// (3-cell diagonal + vertical extension at the end).
// Verified NOT present in any rotation of the current set:
// current 4-chain pieces are either straight (I) or zigzag (S, Z).
const NEW_PIECES = {
  'L (new)': {
    cells: [[-1,1],[0,0],[1,-1],[1,-2]],
    color: '#FF1493',
    note: '3-cell diagonal (up-right) + vertical extension at top-right. True "L" silhouette.',
  },
  'J (new)': {
    cells: [[1,0],[0,0],[-1,0],[-1,-1]],
    color: '#3377FF',
    note: '3-cell diagonal (up-left) + vertical extension at top-left. True "J" silhouette (mirror of L).',
  },
};

// Proposed final set: 8 pieces.
// T removed; current L renamed to q, current J renamed to p
// (their flat-top silhouettes read more like lowercase q and p than L and J);
// two new L/J pieces added with true L/J silhouettes.
const FINAL_PIECES = {
  I: { cells: CURRENT_PIECES.I.cells, color: CURRENT_PIECES.I.color },
  O: { cells: CURRENT_PIECES.O.cells, color: CURRENT_PIECES.O.color },
  S: { cells: CURRENT_PIECES.S.cells, color: CURRENT_PIECES.S.color },
  Z: { cells: CURRENT_PIECES.Z.cells, color: CURRENT_PIECES.Z.color },
  q: { cells: CURRENT_PIECES.L.cells, color: '#FFD700', note: 'renamed from L (chevron ribbon + right stem — reads as "q")' },
  p: { cells: CURRENT_PIECES.J.cells, color: '#00CED1', note: 'renamed from J (chevron ribbon + left stem — reads as "p")' },
  L: { cells: NEW_PIECES['L (new)'].cells, color: '#FF1493', note: 'new — 3-diagonal + top-right vertical extension' },
  J: { cells: NEW_PIECES['J (new)'].cells, color: '#3377FF', note: 'new — 3-diagonal + top-left vertical extension' },
};

// ===================== Hex math =====================
// Rotation and offset conversion mirror server/HexPiece.js exactly.

function rotateCW(cells) {
  return cells.map(function(c) { return [-c[1], c[0] + c[1]]; });
}

function allRotations(cells) {
  var rots = [cells];
  for (var i = 1; i < 6; i++) rots.push(rotateCW(rots[i - 1]));
  return rots;
}

function axialToOffset(q, r) {
  return { col: q, row: r + ((q - (q & 1)) >> 1) };
}

// Flat-top odd-q hex center (matches server/HexConstants.js `hc()`).
function hexCenter(col, row, hs) {
  var hexH = Math.sqrt(3) * hs;
  var colW = 1.5 * hs;
  return {
    x: col * colW + hs,
    y: row * hexH + 0.5 * (col & 1) * hexH + hexH / 2,
  };
}

function hexPolygonPoints(cx, cy, hs) {
  var pts = [];
  for (var i = 0; i < 6; i++) {
    var a = (Math.PI / 3) * i;
    pts.push((cx + hs * Math.cos(a)).toFixed(1) + ',' + (cy + hs * Math.sin(a)).toFixed(1));
  }
  return pts.join(' ');
}

// ===================== SVG rendering =====================
function renderPieceSvg(cells, color, hs) {
  hs = hs || 13;
  var offsets = cells.map(function(c) { return axialToOffset(c[0], c[1]); });
  var centers = offsets.map(function(o) { return hexCenter(o.col, o.row, hs); });

  var hexH = Math.sqrt(3) * hs;
  var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  centers.forEach(function(c) {
    if (c.x - hs < minX) minX = c.x - hs;
    if (c.x + hs > maxX) maxX = c.x + hs;
    if (c.y - hexH / 2 < minY) minY = c.y - hexH / 2;
    if (c.y + hexH / 2 > maxY) maxY = c.y + hexH / 2;
  });
  var pad = 4;
  var w = maxX - minX + 2 * pad;
  var h = maxY - minY + 2 * pad;
  var ox = -minX + pad;
  var oy = -minY + pad;

  var svg = '<svg class="rot-svg" width="' + w.toFixed(0) + '" height="' + h.toFixed(0) +
            '" xmlns="http://www.w3.org/2000/svg">';
  centers.forEach(function(c) {
    var points = hexPolygonPoints(c.x + ox, c.y + oy, hs);
    svg += '<polygon points="' + points + '" fill="' + color +
           '" stroke="#fff" stroke-width="1.5" stroke-opacity="0.35"/>';
  });
  svg += '</svg>';
  return svg;
}

// ===================== DOM rendering =====================
function createPieceCard(name, piece, flavor) {
  var el = document.createElement('div');
  el.className = 'piece' + (flavor ? ' ' + flavor : '');

  var header = document.createElement('div');
  header.className = 'piece-header';
  var nameEl = document.createElement('div');
  nameEl.className = 'piece-name';
  nameEl.textContent = name;
  header.appendChild(nameEl);

  if (flavor === 'problem') {
    var b = document.createElement('span');
    b.className = 'piece-badge badge-problem';
    b.textContent = 'remove';
    header.appendChild(b);
  } else if (flavor === 'new') {
    var b2 = document.createElement('span');
    b2.className = 'piece-badge badge-new';
    b2.textContent = 'new';
    header.appendChild(b2);
  } else if (flavor === 'rename') {
    var b3 = document.createElement('span');
    b3.className = 'piece-badge badge-rename';
    b3.textContent = 'renamed';
    header.appendChild(b3);
  }
  el.appendChild(header);

  if (piece.note) {
    var note = document.createElement('div');
    note.className = 'piece-note';
    note.textContent = piece.note;
    el.appendChild(note);
  }

  var rots = allRotations(piece.cells);
  var rotsEl = document.createElement('div');
  rotsEl.className = 'rotations';
  rots.forEach(function(rotCells, i) {
    var r = document.createElement('div');
    r.className = 'rotation';
    r.innerHTML = renderPieceSvg(rotCells, piece.color);
    var label = document.createElement('div');
    label.className = 'rot-label';
    label.textContent = (i * 60) + '\u00b0';
    r.appendChild(label);
    rotsEl.appendChild(r);
  });
  el.appendChild(rotsEl);

  return el;
}

function renderSection(title, intro, pieces, flavorMap) {
  var app = document.getElementById('app');

  var h2 = document.createElement('h2');
  h2.textContent = title;
  app.appendChild(h2);

  if (intro) {
    var p = document.createElement('p');
    p.className = 'intro';
    p.textContent = intro;
    app.appendChild(p);
  }

  var grid = document.createElement('div');
  grid.className = 'piece-grid';
  Object.keys(pieces).forEach(function(name) {
    var flavor = flavorMap && flavorMap[name] ? flavorMap[name] : null;
    // Pull optional note from piece itself
    var piece = pieces[name];
    grid.appendChild(createPieceCard(name, piece, flavor));
  });
  app.appendChild(grid);
}

// ===================== Sections =====================
renderSection(
  'Current 7 pieces',
  'All 6 axial rotations shown for each piece. T is the problem: it is a pure tripod — its hub has three legs at 120\u00b0 with no two legs adjacent — so every rotation leaves a hole between the legs when placed on a surface.',
  CURRENT_PIECES,
  { T: 'problem' }
);

renderSection(
  'Proposed new pieces (structurally new)',
  '4-chains with a single 60\u00b0 bend. Default orientation chosen so the piece reads as a true L or J silhouette. Current 4-chain pieces are either straight (I) or double-bend zigzag (S, Z), so this topology does not already exist in the set.',
  NEW_PIECES,
  { 'L (new)': 'new', 'J (new)': 'new' }
);

renderSection(
  'Final proposed set (8 pieces)',
  'T removed. Current L and J renamed to q and p — in flat-top hex their silhouettes (chevron ribbon + stem) read more like lowercase q and p than L and J. Two new pieces added with true L and J silhouettes.',
  FINAL_PIECES,
  { q: 'rename', p: 'rename', L: 'new', J: 'new' }
);
</script>
</body>
</html>
