<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: #06060f;
    }

    .banner {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .display-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
    }

    .display-square {
      clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
    }

    .display-hex {
      clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
    }

    /* Variation 2: Colored pill badges, no divider line */
    .mode-pill {
      position: absolute;
      top: 10px;
      padding: 5px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      border-radius: 20px;
      z-index: 6;
      transform: translateX(-50%);
    }
    .mode-pill.left {
      left: 25%;
      color: #fff;
      background: linear-gradient(135deg, rgba(59,130,246,0.7), rgba(99,102,241,0.7));
      border: 1px solid rgba(99,102,241,0.5);
      box-shadow: 0 0 12px rgba(99,102,241,0.3);
    }
    .mode-pill.right {
      left: 75%;
      color: #fff;
      background: linear-gradient(135deg, rgba(234,179,8,0.7), rgba(249,115,22,0.7));
      border: 1px solid rgba(249,115,22,0.5);
      box-shadow: 0 0 12px rgba(249,115,22,0.3);
    }

    .overlay-gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(6,6,15,0.85) 0%, rgba(6,6,15,0.15) 35%, transparent 55%);
      pointer-events: none;
    }

    .phone {
      position: absolute;
      bottom: var(--phone-bottom, -18px);
      left: var(--phone-left);
      width: 120px;
      height: var(--phone-height, 195px);
      border-radius: 18px;
      background: #111122;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.7),
        0 0 24px color-mix(in srgb, var(--color) 12%, transparent);
      padding: 3px;
      z-index: 10;
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 8px;
      border-radius: 5px;
      background: #000;
      z-index: 2;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 15px;
      overflow: hidden;
      background: #080810;
      padding-top: 14px;
    }

    .controller-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img class="display-img display-square" id="display-img" alt="">
    <img class="display-img display-hex" id="display-hex-img" alt="">
    <div class="mode-pill left">Square</div>
    <div class="mode-pill right">Hex</div>
    <div class="overlay-gradient"></div>

    <div class="phone" id="phone-0" style="--phone-left: 16%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-0" alt=""></div>
    </div>
    <div class="phone" id="phone-1" style="--phone-left: 41%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-1" alt=""></div>
    </div>
    <div class="phone" id="phone-2" style="--phone-left: 66%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-2" alt=""></div>
    </div>
    <div class="phone" id="phone-3" style="--phone-left: 90%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-3" alt=""></div>
    </div>
  </div>
</body>
</html>
