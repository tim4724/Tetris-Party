name: AirConsole Build

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Build AirConsole ZIP
        run: bash scripts/build-airconsole.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/airconsole.zip
